<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My GitHub.io Website</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f7f7f7;
            color: #333;
        }
        header {
            background-color: #a8dadc;
            padding: 20px;
            text-align: center;
        }
        nav {
            display: flex;
            justify-content: center;
            background-color: #457b9d;
            padding: 10px;
        }
        nav a {
            color: #f1faee;
            text-decoration: none;
            margin: 0 15px;
            font-size: 18px;
        }
        nav a:hover {
            color: #e63946;
        }
        .container {
            padding: 20px;
            text-align: center;
        }
        .container h1 {
            color: #1d3557;
        }
        .container p {
            color: #457b9d;
        }
        footer {
            background-color: #a8dadc;
            padding: 10px;
            text-align: center;
            position: fixed;
            width: 100%;
            bottom: 0;
        }
    </style>
</head>
<body>
    <header>
        <h1>Welcome to My GitHub.io Website</h1>
    </header>
    <nav>
        <a href="#home">Home</a>
        <a href="#projects">Projects</a>
        <a href="#profile">Profile</a>
        <a href="#contact">Contact Me</a>
    </nav>
    <div class="container" id="home">
        <h1>Home</h1>
        <p>This is the home section of my GitHub.io website.</p>
    </div>
    <div class="container" id="projects">
        <h1>Projects</h1>
        <p>Here you will find my projects.</p>
    </div>
    <div class="container" id="profile">
        <h1>Profile</h1>
        <p>This is my profile section.</p>
    </div>
    <div class="container" id="contact">
        <h1>Contact Me</h1>
        <p>Feel free to reach out to me!</p>
    </div>
    <footer>
        <p>&copy; 2023 My GitHub.io Website</p>
    </footer>
</body>
</html>
