<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My GitHub.io Page</title>
    <style>
        body {
            background-color: #1a1a1a;
            color: #ffffff;
            font-family: 'Arial', sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .container {
            text-align: center;
            border: 2px solid #ffffff;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
        }
        h1 {
            font-size: 3em;
            color: #e600e6;
            text-shadow: 0 0 10px #e600e6, 0 0 20px #e600e6, 0 0 30px #e600e6;
        }
        p {
            font-size: 1.2em;
            color: #00bfff;
            text-shadow: 0 0 10px #00bfff, 0 0 20px #00bfff, 0 0 30px #00bfff;
        }
        a {
            color: #ffffff;
            text-decoration: none;
            border: 2px solid #00bfff;
            padding: 10px 20px;
            border-radius: 5px;
            transition: background-color 0.3s, color 0.3s;
        }
        a:hover {
            background-color: #00bfff;
            color: #1a1a1a;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Welcome to My GitHub.io Page</h1>
        <p>This is an elegant page with a purple and blue neon scheme.</p>
        <a href="https://github.com/yourusername">Visit My GitHub</a>
    </div>
</body>
</html>
